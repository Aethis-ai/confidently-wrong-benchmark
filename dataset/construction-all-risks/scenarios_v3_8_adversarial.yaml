  notes: >
    £50M (well below ALL enhanced cover/pioneer thresholds). Design
    defect (the most-restrictive origin). BUT NOT access damage and
    consequence_of_failure=true. This is consequential damage to
    non-defective property — Carveback Route A. Cl.8 access exclusion
    doesn't trigger because is_access_damage=false. So all gates pass:
    not rectification, carveback (consequence), not access damage.
    Result: eligible. Strongly contradictory cue: "£50M small project +
    design defect" looks like a clear no, but the access vs consequence
    distinction is what matters.

