# =============================================================
# Category E: Conjunction tracking — every condition near-violating
# =============================================================

- name: v38_e1_all_near_failing_eligible
  inputs:
    car.policy.period_valid: true
    car.property.category: existing_structures
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: design
    car.claim.is_rectification: false
    car.claim.is_access_damage: true
    car.damage.consequence_of_failure: true
    car.project.value_millions_gbp: 500
    car.notification.within_period: true
    car.contract.jct_compliant: true
  expect:
    outcome: eligible
  tags: [v3_8_adversarial, ultimate]
  notes: >
    Every single condition is satisfied at its tightest possible value:
    period valid, category is existing_structures (most-restrictive
    valid category, requires JCT), JCT compliant, design defect (most
    restrictive defect origin, needs pioneer), access damage (triggers
    Cl.9 chain), exactly £500M (pioneer threshold exactly), consequence
    (carveback), notification compliant, not rectification. Every gate
    passes by exactly its minimum. Result: eligible. Adversarial in
    composition: any single negative flip breaks it.

- name: v38_e2_all_near_failing_kicked_by_one
  inputs:
    car.policy.period_valid: true
    car.property.category: existing_structures
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: design
    car.claim.is_rectification: false
    car.claim.is_access_damage: true
    car.damage.consequence_of_failure: true
    car.project.value_millions_gbp: 500
    car.notification.within_period: true
    car.contract.jct_compliant: false
  expect:
    outcome: not_eligible
  tags: [v3_8_adversarial, ultimate, multi_failure]
  notes: >
    Identical to E1 except JCT=false. Existing_structures category
    triggers Cl.10 requirement, JCT=false breaks the implication.
    Result: not_eligible. Tests whether the LLM tracks the JCT
    requirement specifically when it's the ONLY failing condition
    in an otherwise minimal-pass scenario.

- name: v38_e3_negation_double_carveback
  inputs:
    car.policy.period_valid: true
    car.property.category: permanent_works
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: workmanship
    car.claim.is_rectification: false
    car.claim.is_access_damage: false
    car.damage.consequence_of_failure: false
    car.project.value_millions_gbp: 200
    car.notification.within_period: true
    car.contract.jct_compliant: true
  expect:
    outcome: eligible
  tags: [v3_8_adversarial, negation_stacking]
  notes: >
    NOT access damage AND NOT consequence_of_failure. Carveback
    qualification = consequence OR NOT(is_access_damage). is_access_damage
    is false → NOT(is_access_damage) is true → carveback group OR'd to
    true (Route B passes vacuously). Cl.8 access_exclusion doesn't
    trigger (not access damage). So Cl.9 chain irrelevant. All other
    gates pass. Result: eligible. The double-negative carveback is
    intentionally non-obvious.

- name: v38_e4_carveback_gap_explicit
  inputs:
    car.policy.period_valid: true
    car.property.category: permanent_works
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: workmanship
    car.claim.is_rectification: false
    car.claim.is_access_damage: true
    car.damage.consequence_of_failure: false
    car.project.value_millions_gbp: 200
    car.notification.within_period: true
    car.contract.jct_compliant: true
  expect:
    outcome: not_eligible
  tags: [v3_8_adversarial, negation_stacking, ultimate]
  notes: >
    Access damage AND NOT consequence_of_failure. Per Cl.7 commentary:
    "consequence_of_failure=false, is_access_damage=false passes Route B
    but not Route A — this is the DE3/LEG3 coverage gap." Conversely,
    is_access_damage=TRUE and consequence=FALSE, the carveback group
    fails: Route A needs consequence=true, Route B needs NOT(is_access)
    which is false. Carveback_qualification fails. Result: not_eligible.
    The DE3/LEG3 gap as an explicit test, with adversarial £200M that
    suggests enhanced cover should help (it doesn't, because carveback
    is a required gate before enhanced cover is even reached).
