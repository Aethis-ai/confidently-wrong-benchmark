tests:

# === BASELINE: golden path ===

- name: golden_path_eligible
  inputs:
    ben.claimant.age: 35
    ben.claimant.present_in_gb: true
    ben.residence.right_to_reside: true
    ben.residence.habitually_resident: true
    ben.residence.immigration_status: none
    ben.benefit.receiving_exclusionary: false
    ben.income.weekly_gbp: 200
    ben.capital.total_gbp: 5000
  expect:
    outcome: eligible
  tags:
    - baseline

# === PRESENCE: early termination (Reg 4) ===

- name: not_present_in_gb
