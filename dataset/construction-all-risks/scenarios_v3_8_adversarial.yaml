# Construction-CAR v3.8 adversarial extension
#
# Author: Paul Simpson, 2026-04-26.
# Purpose: 20 scenarios designed to push beyond the existing 74 in
# adversarial composition. Each combines 3+ rule dimensions and is
# designed to trip composition-tracking failures in current frontier
# LLMs (Opus 4.7, GPT-5.4) that have closed the simpler v3.6/v3.7
# failure cases.
#
# Methodology: each scenario authored with an independent prose
# expected-value (the `notes:` field) BEFORE engine verification.
# Engine output is then checked against the prose. Disagreements
# resolved before frontier-LLM testing.
#
# Five categories × 4 scenarios each = 20 total.
# A: Maximum-stack adversarial (3+ failure modes simultaneously)
# B: Threshold-boundary edge cases (just-at, just-below, just-above)
# C: Multi-clause cross-reference (existing_structures + JCT + design)
# D: Surface-vs-deep contradiction (surface text suggests opposite)
# E: Conjunction tracking (every condition near-violating)

tests:

# =============================================================
# Category A: Maximum-stack adversarial
# =============================================================

- name: v38_a1_pioneer_killed_by_jct
  inputs:
    car.policy.period_valid: true
    car.property.category: existing_structures
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: design
    car.claim.is_rectification: false
    car.claim.is_access_damage: true
    car.damage.consequence_of_failure: true
    car.project.value_millions_gbp: 600
    car.notification.within_period: true
    car.contract.jct_compliant: false
  expect:
    outcome: not_eligible
  tags: [v3_8_adversarial, multi_failure, contradictory_cue]
  notes: >
    A £600M pioneer infrastructure project (well above £500M pioneer
    threshold) with a design defect and access damage. Pioneer override
    DOES reinstate cover under Cl.9(3) for design + access at this scale.
    Carveback passes (Route A, consequence=true). Notification compliant.
    BUT property is an existing structure and the contract is NOT
    JCT-compliant, so Cl.10 fails. Result: not_eligible. Adversarial
    because the pioneer/design/access reasoning is the dominant signal;
    the JCT fact is buried among 11 fields.

- name: v38_a2_499m_design_chain_kills
  inputs:
    car.policy.period_valid: true
    car.property.category: permanent_works
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: design
    car.claim.is_rectification: false
    car.claim.is_access_damage: true
    car.damage.consequence_of_failure: true
    car.project.value_millions_gbp: 499
    car.notification.within_period: true
    car.contract.jct_compliant: true
  expect:
    outcome: not_eligible
  tags: [v3_8_adversarial, boundary, multi_failure]
  notes: >
    £499M (one million below pioneer threshold). Design defect, access
    damage, consequence_of_failure=true. Carveback passes (Route A).
    Enhanced cover applies (≥£100M). But design_defect_check triggers
    Cl.9(2) and pioneer_override DOES NOT apply (£499M < £500M).
    Therefore access damage from a design defect is NOT covered.
    Result: not_eligible. The £499M-vs-£500M boundary is sharp.

- name: v38_a3_pioneer_at_exact_threshold
  inputs:
    car.policy.period_valid: true
    car.property.category: permanent_works
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: design
    car.claim.is_rectification: false
    car.claim.is_access_damage: true
    car.damage.consequence_of_failure: true
    car.project.value_millions_gbp: 500
    car.notification.within_period: true
    car.contract.jct_compliant: true
  expect:
    outcome: eligible
  tags: [v3_8_adversarial, boundary]
  notes: >
    £500M exactly. Design defect, access damage, consequence=true.
    Pioneer threshold is "≥ £500M" so £500M qualifies (Cl.9(3)).
    Pioneer overrides design limit. Enhanced cover applies. All other
    conditions met. Result: eligible. The boundary IS inclusive.

- name: v38_a4_rectification_kills_despite_pioneer
  inputs:
    car.policy.period_valid: true
    car.property.category: permanent_works
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: workmanship
    car.claim.is_rectification: true
    car.claim.is_access_damage: false
    car.damage.consequence_of_failure: true
    car.project.value_millions_gbp: 1000
    car.notification.within_period: true
    car.contract.jct_compliant: true
  expect:
    outcome: not_eligible
  tags: [v3_8_adversarial, multi_failure, ultimate]
  notes: >
    £1B mega-project, workmanship defect (most-permissive origin), with
    consequence_of_failure=true. BUT the claim is for rectification of
    the defective component itself. Cl.6 is absolute: rectification is
    excluded "regardless of project value, enhanced cover or pioneer
    infrastructure provisions, defect origin, or any carve-back".
    No reinstatement. Result: not_eligible. Adversarial: every other
    signal points to eligible.

