tests:
  - name: "all three different states, amount well above threshold"
    inputs: {plaintiff_1_state: California, plaintiff_2_state: Texas, defendant_state: New York, claim_amount_per_plaintiff_usd: 200000}
    expect: {outcome: eligible}

  - name: "plaintiff_1 shares state with defendant"
    inputs: {plaintiff_1_state: Florida, plaintiff_2_state: Georgia, defendant_state: Florida, claim_amount_per_plaintiff_usd: 500000}
    expect: {outcome: not_eligible}

  - name: "plaintiff_2 shares state with defendant"
    inputs: {plaintiff_1_state: Ohio, plaintiff_2_state: Michigan, defendant_state: Michigan, claim_amount_per_plaintiff_usd: 500000}
    expect: {outcome: not_eligible}

  - name: "all different, amount exactly threshold"
    inputs: {plaintiff_1_state: Illinois, plaintiff_2_state: Indiana, defendant_state: Wisconsin, claim_amount_per_plaintiff_usd: 75000}
    expect: {outcome: not_eligible}

  - name: "all different, amount $1 above threshold"
    inputs: {plaintiff_1_state: Vermont, plaintiff_2_state: Maine, defendant_state: New Hampshire, claim_amount_per_plaintiff_usd: 75001}
    expect: {outcome: eligible}

  - name: "both plaintiffs share state with each other but not defendant, amount large"
    inputs: {plaintiff_1_state: Wyoming, plaintiff_2_state: Wyoming, defendant_state: Montana, claim_amount_per_plaintiff_usd: 500000}
    expect: {outcome: eligible}

  - name: "all different, amount well below threshold"
    inputs: {plaintiff_1_state: Alaska, plaintiff_2_state: Hawaii, defendant_state: Oregon, claim_amount_per_plaintiff_usd: 30000}
    expect: {outcome: not_eligible}

  - name: "all three same state"
    inputs: {plaintiff_1_state: Texas, plaintiff_2_state: Texas, defendant_state: Texas, claim_amount_per_plaintiff_usd: 1000000}
    expect: {outcome: not_eligible}
