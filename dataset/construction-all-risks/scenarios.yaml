# ============================================================================
# Contradictory surface cues
# Appearance contradicts outcome — designed to trigger confident wrong answers
# ============================================================================

- name: surface_eligible_design_access_blocks
  # 10 of 11 fields favour eligibility. Pioneer-scale project (£800M),
  # all certs, timely notification, JCT compliant. But: access damage +
  # design defect at only £200M → design exclusion blocks enhanced cover.
  # LLMs see the "mostly eligible" pattern and anchor to it.
  inputs:
    car.policy.period_valid: true
    car.property.category: permanent_works
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: design
    car.claim.is_rectification: false
    car.claim.is_access_damage: true
    car.damage.consequence_of_failure: true
    car.project.value_millions_gbp: 150
