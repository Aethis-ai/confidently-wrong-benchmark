    car.contract.jct_compliant: true
  expect:
    outcome: not_eligible
  tags:
  - contradictory_cue

- name: surface_ineligible_pioneer_saves
  # Looks bad: access damage, design defect — but £600M pioneer override
  # AND consequence of failure proven (LEG3 carve-back). Pioneer rescues the
  # access exclusion, LEG3 satisfies carve-back. LLMs see "access + design"
  # and anchor to ineligible.
  inputs:
    car.policy.period_valid: true
    car.property.category: permanent_works
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: design
    car.claim.is_rectification: false
    car.claim.is_access_damage: true
    car.damage.consequence_of_failure: true
    car.project.value_millions_gbp: 600
    car.notification.within_period: true
    car.contract.jct_compliant: true
  expect:
    outcome: eligible
  tags:
  - contradictory_cue

- name: surface_eligible_rectification_kills
  # Everything maxed: £800M pioneer, existing structures, JCT, all certs.
  # But rectification is absolute — Clause 6 cannot be overridden.
  # LLMs see the overwhelming positive signals and miss the one absolute bar.
  inputs:
    car.policy.period_valid: true
    car.property.category: existing_structures
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: workmanship
    car.claim.is_rectification: true
