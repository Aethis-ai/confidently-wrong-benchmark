# ============================================================================
# Negation stacking
# Double/triple negation reasoning — LLMs struggle with stacked negations
# ============================================================================

- name: neg_de3_double_negative
  # NOT access damage + NOT consequence → DE3 carve-back (Route B) applies.
  # "Not caused solely to gain access" is a double negative in the source text.
  # Small project, no enhanced cover — but irrelevant because no access exclusion.
  inputs:
    car.policy.period_valid: true
    car.property.category: permanent_works
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: workmanship
    car.claim.is_rectification: false
    car.claim.is_access_damage: false
    car.damage.consequence_of_failure: false
    car.project.value_millions_gbp: 50
    car.notification.within_period: true
    car.contract.jct_compliant: true
  expect:
    outcome: eligible
  tags:
  - negation_stacking

- name: neg_access_without_consequence_no_enhanced
  # IS access + NOT consequence + small project → access exclusion blocks.
  # LLMs may confuse "not consequence of failure" with a mitigating factor,
  # but it only matters for Route A (LEG3) — not for the access exclusion.
  inputs:
    car.policy.period_valid: true
    car.property.category: permanent_works
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: workmanship
    car.claim.is_rectification: false
    car.claim.is_access_damage: true
    car.damage.consequence_of_failure: false
    car.project.value_millions_gbp: 50
    car.notification.within_period: true
    car.contract.jct_compliant: true
  expect:
    outcome: not_eligible
  tags:
  - negation_stacking

- name: neg_triple_not_de3_pass
  # NOT rectification, NOT access, NOT consequence → eligible via DE3.
  # Three negated fields, all of which are necessary conditions for exclusion.
  inputs:
    car.policy.period_valid: true
    car.property.category: temporary_works
    car.loss.is_physical: true
    car.component.is_defective: true
    car.defect.origin: materials
    car.claim.is_rectification: false
    car.claim.is_access_damage: false
    car.damage.consequence_of_failure: false
    car.project.value_millions_gbp: 200
    car.notification.within_period: true
    car.contract.jct_compliant: true
  expect:
    outcome: eligible
  tags:
  - negation_stacking

